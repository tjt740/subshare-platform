name: Deploy to Aliyun

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: subshare-platform-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
      ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
      ALIYUN_PORT: ${{ secrets.ALIYUN_PORT }}
      ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
      ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}

    steps:
      - name: Validate deploy configuration
        shell: bash
        run: |
          missing=()
          for name in ALIYUN_HOST ALIYUN_USER ALIYUN_SSH_KEY ALIYUN_DEPLOY_PATH; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate build
        run: |
          npm ci
          npm run build

      - name: Prepare SSH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rsync openssh-client
          mkdir -p ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" > ~/.ssh/aliyun_deploy_key
          chmod 600 ~/.ssh/aliyun_deploy_key
          ssh-keyscan -p "${ALIYUN_PORT:-22}" "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Sync code
        run: |
          ssh -i ~/.ssh/aliyun_deploy_key -p "${ALIYUN_PORT:-22}" "$ALIYUN_USER@$ALIYUN_HOST" \
            "mkdir -p '$ALIYUN_DEPLOY_PATH'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.deploy.env' \
            --exclude 'node_modules/' \
            --exclude 'web/dist/' \
            --exclude 'admin/dist/' \
            --exclude 'server/dist/' \
            --exclude 'server/data/*.db*' \
            --exclude '*.log' \
            -e "ssh -i ~/.ssh/aliyun_deploy_key -p ${ALIYUN_PORT:-22}" \
            ./ "$ALIYUN_USER@$ALIYUN_HOST:$ALIYUN_DEPLOY_PATH/"

      - name: Deploy services
        run: |
          ssh -i ~/.ssh/aliyun_deploy_key -p "${ALIYUN_PORT:-22}" "$ALIYUN_USER@$ALIYUN_HOST" \
            "cd '$ALIYUN_DEPLOY_PATH' && PUBLIC_PORT=9999 API_PORT=9998 SERVER_NAME='$ALIYUN_HOST' ./scripts/deploy_server.sh"

      - name: Verify public health
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            "http://$ALIYUN_HOST:9999/api/health"
